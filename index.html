<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AegisSpace AI — Real-Time Satellite Launch Monitoring</title>
    <meta name="description" content="AegisSpace AI provides real-time satellite launch monitoring and anomaly detection powered by ESP32 telemetry, AI predictions, and mission-control dashboards." />
    <meta name="author" content="AegisSpace AI" />
    <meta property="og:title" content="AegisSpace AI — Real-Time Satellite Launch Monitoring" />
    <meta property="og:description" content="Monitor satellite launches in real-time with AI-powered anomaly detection and mission control dashboards." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://aegisspace.ai" />
    <script>
      (function () {
        if (!location.hostname.includes("localhost")) return;

        const originalInfo = console.info.bind(console);
        const originalDebug = console.debug.bind(console);

        console.info = function (...args) {
          const first = String(args[0] ?? "");
          if (first.includes("Download the React DevTools")) return;
          originalInfo(...args);
        };

        console.debug = function (...args) {
          const first = String(args[0] ?? "");
          if (first.includes("[vite] connecting") || first.includes("[vite] connected")) return;
          originalDebug(...args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
